<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon -->
  <polygon
    points="40,6 62,6 74,26 62,46 40,46 28,26"
    fill="url(#hexGrad)"
    filter="url(#glow)"
    stroke="#00BFFF"
    stroke-width="1"
  />

  <!-- Letter C inside hexagon -->
  <text
    x="51" y="29"
    font-family="Arial, sans-serif"
    font-size="26"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >C</text>

  <!-- Chinese name (top, white bold) -->
  <text
    x="90" y="24"
    font-family="'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif"
    font-size="15"
    font-weight="700"
    fill="white"
    letter-spacing="1"
  >恆煦電子材料股份有限公司</text>

  <!-- English name (bottom, light blue-gray) -->
  <text
    x="90" y="44"
    font-family="Arial, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#8ba5c4"
    letter-spacing="0.5"
  >Consistent Electronic Materials, Inc.</text>
</svg>
