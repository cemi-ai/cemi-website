<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 80" width="560" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon (pointy-top, center 40,40, circumradius 34) -->
  <polygon
    points="40,6 69,23 69,57 40,74 11,57 11,23"
    fill="url(#hexGrad)"
    filter="url(#glow)"
    stroke="#00BFFF"
    stroke-width="1"
  />

  <!-- Letter C — large but fits inside hexagon -->
  <text
    x="40" y="40"
    font-family="Arial, sans-serif"
    font-size="38"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >C</text>

  <!-- Chinese name — letter-spacing to match English width, no glyph distortion -->
  <text
    x="90" y="28"
    font-family="'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif"
    font-size="18"
    font-weight="700"
    fill="white"
    letter-spacing="10.5"
  >恆煦電子材料股份有限公司</text>

  <!-- English name — natural spacing -->
  <text
    x="90" y="56"
    font-family="Arial, 'Segoe UI', sans-serif"
    font-size="15"
    font-weight="400"
    fill="#8ba5c4"
    letter-spacing="0.3"
  >Consistent Electronic Materials, Inc.</text>
</svg>
