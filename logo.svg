<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Flat-top hexagon: top edge aligns with top of Chinese, bottom edge aligns with bottom of English -->
  <polygon
    points="27,8 54,8 68,34 54,60 27,60 13,34"
    fill="url(#hexGrad)"
    filter="url(#glow)"
    stroke="#00BFFF"
    stroke-width="1"
  />

  <!-- Letter C — 48px, centered in hexagon -->
  <text
    x="40" y="34"
    font-family="Arial, sans-serif"
    font-size="48"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central"
  >C</text>

  <!-- Chinese name — top aligns with hexagon top (y≈8) -->
  <text
    x="85" y="28"
    font-family="'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif"
    font-size="23"
    font-weight="700"
    fill="white"
    letter-spacing="3"
  >恆煦電子材料股份有限公司</text>

  <!-- English name — bottom aligns with hexagon bottom (y≈60), matches Chinese width -->
  <text
    x="85" y="57"
    font-family="Arial, 'Segoe UI', sans-serif"
    font-size="17"
    font-weight="400"
    fill="#8ba5c4"
    textLength="309"
    lengthAdjust="spacingAndGlyphs"
  >Consistent Electronic Materials, Inc.</text>
</svg>
